<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Learning Hub</title>
  <style>
    :root {
      --bg: #FAF9F7;
      --accent: #DA7756;
      --accent2: #F0EBE5;
      --text: #2D2B28;
      --text-muted: #6B6560;
      --card-bg: #fff;
      --shadow: rgba(0,0,0,0.06);
      --shadow-hover: rgba(0,0,0,0.1);
      --border-color: #D9D2CB;
    }

    [data-theme="dark"] {
      --bg: #1A1915;
      --accent: #DA7756;
      --accent2: #302C28;
      --text: #E8E2DC;
      --text-muted: #9B9590;
      --card-bg: #252220;
      --shadow: rgba(0,0,0,0.3);
      --shadow-hover: rgba(0,0,0,0.4);
      --border-color: #3D3935;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 60px 24px 40px;
    }

    header h1 {
      font-size: 3rem;
      margin-bottom: 12px;
      color: var(--text);
    }

    header p {
      font-size: 1.3rem;
      color: var(--text-muted);
    }

    .search-bar {
      max-width: 500px;
      margin: 0 auto 24px;
      padding: 0 24px;
    }

    .search-bar input {
      width: 100%;
      padding: 14px 20px;
      font-size: 1.1rem;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--text-muted); }

    .course-count {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      padding: 0 24px 16px;
    }

    .courses {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px 60px;
    }

    .course-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 36px 32px;
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 2px 12px var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      border-top: 5px solid var(--accent);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .course-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px var(--shadow-hover);
    }

    .course-icon {
      font-size: 3rem;
      margin-bottom: 4px;
    }

    .course-card h2 {
      font-size: 1.7rem;
      color: var(--accent);
    }

    .course-card p {
      font-size: 1.15rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .tag {
      display: inline-block;
      background: var(--accent2);
      color: var(--accent);
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .slide-count {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 8px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      header { padding: 40px 20px 28px; }
      header h1 { font-size: 2.4rem; }
      header p { font-size: 1.15rem; }

      .courses {
        grid-template-columns: 1fr;
        padding: 0 20px 40px;
        gap: 20px;
      }

      .course-card { padding: 28px 24px; }
      .course-card h2 { font-size: 1.5rem; }
      .course-card p { font-size: 1.1rem; }
    }

    @media (max-width: 480px) {
      header h1 { font-size: 2rem; }
      header p { font-size: 1.05rem; }
      .course-icon { font-size: 2.5rem; }
      .course-card h2 { font-size: 1.35rem; }
    }
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, border-color 0.3s;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .theme-toggle:hover { border-color: var(--accent); }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">&#x263E;</button>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateToggleIcon(next);
    }

    function updateToggleIcon(theme) {
      document.getElementById('themeToggle').innerHTML = theme === 'dark' ? '&#x2600;' : '&#x263E;';
    }

    (function() {
      const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', saved);
      updateToggleIcon(saved);
    })();
  </script>

  <header>
    <h1>Learning Hub</h1>
    <p>Short courses on modern engineering tools and frameworks</p>
  </header>

  <div class="search-bar">

function filterCourses() {
  const q = document.getElementById('courseSearch').value.toLowerCase();
  const grid = document.getElementById('courseGrid');
  const countEl = document.getElementById('courseCount');

  const filtered = COURSES.filter(c =>
    !q || c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || c.tags.some(t => t.toLowerCase().includes(q))
  );

  countEl.textContent = filtered.length + ' course' + (filtered.length !== 1 ? 's' : '');

  grid.innerHTML = filtered.map(c => `
    <a href="${c.href}" class="course-card">
      <div class="course-icon">${c.icon}</div>
      <h2>${c.name}</h2>
      <p>${c.desc}</p>
      <div class="tag-row">${c.tags.map(t => '<span class="tag">' + t + '</span>').join('')}</div>
      <div class="slide-count">20 slides &middot; ${c.published}</div>
    </a>
  `).join('');
}

filterCourses();
