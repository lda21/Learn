<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glossary - Learning Hub</title>
  <style>
    :root {
      --bg: #FAF9F7;
      --accent: #DA7756;
      --accent2: #F0EBE5;
      --text: #2D2B28;
      --text-muted: #6B6560;
      --card-bg: #fff;
      --shadow: rgba(0,0,0,0.06);
      --border-color: #D9D2CB;
      --code-bg: #2D2B28;
    }

    [data-theme="dark"] {
      --bg: #1A1915;
      --accent: #DA7756;
      --accent2: #302C28;
      --text: #E8E2DC;
      --text-muted: #9B9590;
      --card-bg: #252220;
      --shadow: rgba(0,0,0,0.3);
      --border-color: #3D3935;
      --code-bg: #131210;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 50px 24px 20px;
      position: relative;
    }

    header h1 { font-size: 2.8rem; margin-bottom: 8px; }
    header p { font-size: 1.2rem; color: var(--text-muted); }

    .back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text-muted);
      box-shadow: 0 2px 8px var(--shadow);
      transition: border-color 0.3s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px var(--shadow);
      transition: background 0.3s, border-color 0.3s;
    }
    .theme-toggle:hover { border-color: var(--accent); }

    /* Search */
    .search-bar {
      max-width: 600px;
      margin: 20px auto 10px;
      padding: 0 24px;
    }

    .search-bar input {
      width: 100%;
      padding: 14px 20px;
      font-size: 1.1rem;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--text-muted); }

    /* Filter tabs */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 16px 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .filter-btn {
      padding: 6px 18px;
      border-radius: 20px;
      border: 2px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Term count */
    .term-count {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      padding: 8px 24px 16px;
    }

    /* Glossary list */
    .glossary {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .letter-group { margin-bottom: 32px; }

    .letter-heading {
      font-size: 1.8rem;
      color: var(--accent);
      font-weight: 700;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .term-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .term-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .term-def {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .term-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .term-tag {
      display: inline-block;
      background: var(--accent2);
      color: var(--accent);
      font-weight: 600;
      padding: 2px 12px;
      border-radius: 16px;
      font-size: 0.8rem;
    }

    code {
      font-family: 'Fira Code', 'Consolas', monospace;
      background: var(--accent2);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.95rem;
    }

    .no-results {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
      font-size: 1.2rem;
      display: none;
    }

    /* Cross-linked terms */
    .term-link {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px dashed var(--accent);
      cursor: pointer;
      position: relative;
    }

    .term-link:hover { border-bottom-style: solid; }

    .term-tooltip {
      display: none;
      position: fixed;
      background: var(--card-bg);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 380px;
      width: max-content;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 1000;
      pointer-events: none;
    }

    .term-tooltip.visible { display: block; }

    .term-tooltip .tt-name {
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 6px;
      color: var(--accent);
    }

    .term-tooltip .tt-def {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.5;
    }

    .term-tooltip .tt-tags {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .term-tooltip .tt-tag {
      display: inline-block;
      background: var(--accent2);
      color: var(--accent);
      font-weight: 600;
      padding: 1px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
    }

    /* Coverage stats */
    .coverage-bar {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 20px;
    }

    .coverage-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .coverage-stat {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 10px 18px;
      box-shadow: 0 2px 8px var(--shadow);
      text-align: center;
      min-width: 100px;
    }

    .coverage-stat .num {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
    }

    .coverage-stat .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      header { padding: 40px 20px 16px; }
      header h1 { font-size: 2.2rem; }
      header p { font-size: 1.1rem; }
      .search-bar input { font-size: 1rem; padding: 12px 16px; }
      .term-card { padding: 16px 18px; }
      .term-name { font-size: 1.15rem; }
      .term-def { font-size: 1rem; }
      .glossary { padding: 0 16px 40px; }
    }

    @media (max-width: 480px) {
      header h1 { font-size: 1.8rem; }
      .letter-heading { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<a href="index.html" class="back-btn" title="Back to courses">&times;</a>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">&#x263E;</button>

<header>
  <h1>Glossary</h1>
  <p>Key terms across all courses</p>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search terms..." oninput="filterTerms()">
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
</div>

<div class="coverage-bar">
  <div class="coverage-stats" id="coverageStats"></div>
</div>

<div class="term-count" id="termCount"></div>

<div class="glossary" id="glossary"></div>
<div class="term-tooltip" id="termTooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-def" id="ttDef"></div>
  <div class="tt-tags" id="ttTags"></div>
</div>
<div class="no-results" id="noResults">No terms found matching your search.</div>

<footer>Built with care for learning</footer>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeToggle').innerHTML = next === 'dark' ? '&#x2600;' : '&#x263E;';
}
(function() {
  const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').innerHTML = saved === 'dark' ? '&#x2600;' : '&#x263E;';
})();

const TERMS = [
  // --- Git ---
  {t:"Branch", d:"A parallel line of development in Git. Branches let you work on features or fixes without affecting the main codebase.", tags:["Git"]},

  {t:"Fast-forward", d:"A Merge strategy where the Branch pointer moves forward linearly because no divergent Commit history exists.", tags:["Git"]},

  {t:"Rebase", d:"Re-apply commits on top of another base Commit, creating a linear history. Avoid rebasing shared branches.", tags:["Git"]},

  {t:"Counter", d:"A Prometheus metric type that only goes up (and resets on restart). Use for request counts, errors. Query with <code>rate()</code>.", tags:["Prometheus"]},

// Build category list from tags
const allTags = [...new Set(TERMS.flatMap(t => t.tags))].sort();
const filterBar = document.getElementById('filterBar');
allTags.forEach(tag => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = tag;
  btn.onclick = function() { setFilter(tag, this); };
  filterBar.appendChild(btn);
});

let activeFilter = 'all';

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterTerms();
}

// Build term lookup index for cross-linking
const termIndex = {};
TERMS.forEach(t => { termIndex[t.t.toLowerCase()] = t; });

// Sort term names by length descending so longer matches take priority
const termNames = TERMS.map(t => t.t).sort((a, b) => b.length - a.length);

function crossLink(defHtml) {
  // Temporarily protect <code>...</code> and existing HTML tags
  const protected_ = [];
  let safe = defHtml.replace(/<[^>]+>/g, m => {
    protected_.push(m);
    return `\x00${protected_.length - 1}\x00`;
  });

  termNames.forEach(name => {
    // Escape special regex chars in term name
    const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`\\b${escaped}\\b`, 'g');
    safe = safe.replace(re, `<span class="term-link" data-term="${name}">${name}</span>`);
  });

  // Restore protected segments
  safe = safe.replace(/\x00(\d+)\x00/g, (_, i) => protected_[parseInt(i)]);
  return safe;
}

function filterTerms() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filtered = TERMS.filter(t => {
    const matchSearch = !query || t.t.toLowerCase().includes(query) || t.d.toLowerCase().includes(query);
    const matchFilter = activeFilter === 'all' || t.tags.includes(activeFilter);
    return matchSearch && matchFilter;
  });

  const sorted = filtered.sort((a, b) => a.t.localeCompare(b.t));
  const glossary = document.getElementById('glossary');
  const noResults = document.getElementById('noResults');
  const termCount = document.getElementById('termCount');

  termCount.textContent = `${sorted.length} term${sorted.length !== 1 ? 's' : ''}`;

  if (sorted.length === 0) {
    glossary.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';

  // Group by letter
  const groups = {};
  sorted.forEach(t => {
    const letter = t.t[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(t);
  });

  let html = '';
  Object.keys(groups).sort().forEach(letter => {
    html += `<div class="letter-group"><div class="letter-heading">${letter}</div>`;
    groups[letter].forEach(t => {
      const linkedDef = crossLink(t.d);
      html += `<div class="term-card">
        <div class="term-name">${t.t}</div>
        <div class="term-def">${linkedDef}</div>
        <div class="term-tags">${t.tags.map(tag => `<span class="term-tag">${tag}</span>`).join('')}</div>
      </div>`;
    });
    html += '</div>';
  });

  glossary.innerHTML = html;
}

// Tooltip handling
const tooltip = document.getElementById('termTooltip');
const ttName = document.getElementById('ttName');
const ttDef = document.getElementById('ttDef');
const ttTags = document.getElementById('ttTags');
let tooltipTimeout;

document.addEventListener('mouseover', function(e) {
  const link = e.target.closest('.term-link');
  if (!link) return;
  clearTimeout(tooltipTimeout);

  const name = link.getAttribute('data-term');
  const term = termIndex[name.toLowerCase()];
  if (!term) return;

  ttName.textContent = term.t;
  ttDef.textContent = term.d.replace(/<[^>]+>/g, '');
  ttTags.innerHTML = term.tags.map(tag => `<span class="tt-tag">${tag}</span>`).join('');

  const rect = link.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;

  // Keep tooltip on screen
  tooltip.classList.add('visible');
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  if (left + tw > window.innerWidth - 16) left = window.innerWidth - tw - 16;
  if (left < 16) left = 16;
  if (top + th > window.innerHeight - 16) top = rect.top - th - 8;

  tooltip.style.top = top + 'px';
  tooltip.style.left = left + 'px';
});

document.addEventListener('mouseout', function(e) {
  const link = e.target.closest('.term-link');
  if (!link) return;
  tooltipTimeout = setTimeout(() => tooltip.classList.remove('visible'), 150);
});

// Click a cross-link to scroll to that term
document.addEventListener('click', function(e) {
  const link = e.target.closest('.term-link');
  if (!link) return;
  tooltip.classList.remove('visible');
  const name = link.getAttribute('data-term');
  // Find the term card with this name
  const cards = document.querySelectorAll('.term-name');
  for (const card of cards) {
    if (card.textContent === name) {
      card.closest('.term-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.closest('.term-card').style.outline = '2px solid var(--accent)';
      setTimeout(() => card.closest('.term-card').style.outline = '', 1500);
      break;
    }
  }
});

// Coverage stats
function renderCoverage() {
  const catCounts = {};
  TERMS.forEach(t => t.tags.forEach(tag => {
    catCounts[tag] = (catCounts[tag] || 0) + 1;
  }));

  const statsEl = document.getElementById('coverageStats');
  // Total first
  let html = `<div class="coverage-stat"><div class="num">${TERMS.length}</div><div class="label">Total</div></div>`;
  // Then per category sorted by count desc
  Object.entries(catCounts).sort((a, b) => b[1] - a[1]).forEach(([tag, count]) => {
    html += `<div class="coverage-stat"><div class="num">${count}</div><div class="label">${tag}</div></div>`;
  });
  statsEl.innerHTML = html;
}

renderCoverage();

// Initial render
filterTerms();
</script>
